<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gigs App Redirect</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f7fa;
            color: #333;
            text-align: center;
            padding: 1rem;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
        }

        p {
            margin: 0.25rem 0 1rem;
        }

        .links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .links li {
            margin: 0.5rem 0;
        }

        .links a {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
        }

        .android {
            background: #3ddc84;
            color: #fff;
        }

        .ios {
            background: #000;
            color: #fff;
        }

        .web {
            background: #0057ff;
            color: #fff;
        }
    </style>
    <script>
      (function () {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        const isAndroid = /android/i.test(ua);
        const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

        if (isAndroid) {
          window.location.replace("https://play.google.com/store/apps/details?id=com.ensemblers.gigs");
        } else if (isIOS) {
          window.location.replace("https://apps.apple.com/nl/app/the-gigs-app/id6738603572?l=en-GB");
        } else {
          window.location.replace("https://thegigsapp.com/")
        }
      })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url=https://thegigsapp.com/">
    </noscript>
</head>
<body>
<h1>The Gigs App</h1>
<p>If nothing happens, pick a link below:</p>
<ul class="links">
    <li><a class="android" href="https://play.google.com/store/apps/details?id=com.ensemblers.gigs">Download on Google&nbsp;Play</a>
    </li>
    <li><a class="ios" href="https://apps.apple.com/nl/app/the-gigs-app/id6738603572?l=en-GB">Download on the App&nbsp;Store</a>
    </li>
    <li><a class="web" href="https://thegigsapp.com/">Open web site</a></li>
</ul>
</body>
</html>
