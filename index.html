<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gigs – Book, Promote & Ticket Live Shows</title>
    <meta name="description"
          content="The all-in-one platform where artists and venues book gigs, promote shows and sell tickets while fans discover and buy – all in one app.">

    <!-- Open Graph -->
    <meta property="og:type"        content="website">
    <meta property="og:site_name"   content="Gigs">
    <meta property="og:title"       content="Gigs – Book, Promote & Ticket Live Shows">
    <meta property="og:description"
          content="Artists and venues manage bookings, promotion and ticket sales in seconds, while fans follow and purchase – all inside one mobile app.">
    <meta property="og:url"         content="https://app.thegigsapp.com">
    <meta property="og:image"       content="https://thegigsapp.com/assets/app-logo.jpg"><!-- 1200×630 JPG/PNG -->

    <!-- Twitter (X) cards -->
    <meta name="twitter:card"       content="summary_large_image">
    <meta name="twitter:title"      content="Gigs – Book, Promote & Ticket Live Shows">
    <meta name="twitter:description"
          content="Artists and venues use Gigs to book, promote and ticket live shows. Fans discover and buy – all in one place.">
    <meta name="twitter:image"      content="https://thegigsapp.com/assets/app-logo.jpg">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f7fa;
            color: #333;
            text-align: center;
            padding: 1rem;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
        }

        p {
            margin: 0.25rem 0 1rem;
        }

        .links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .links li {
            margin: 0.5rem 0;
        }

        .links a {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
        }

        .android {
            background: #3ddc84;
            color: #fff;
        }

        .ios {
            background: #000;
            color: #fff;
        }

        .web {
            background: #0057ff;
            color: #fff;
        }
    </style>
    <script>
      (function () {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        const isAndroid = /android/i.test(ua);
        const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

        if (isAndroid) {
          window.location.replace("https://play.google.com/store/apps/details?id=com.ensemblers.gigs");
        } else if (isIOS) {
          window.location.replace("https://apps.apple.com/nl/app/the-gigs-app/id6738603572?l=en-GB");
        } else {
          window.location.replace("https://thegigsapp.com/")
        }
      })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url=https://thegigsapp.com/">
    </noscript>
</head>
<body>
<h1>The Gigs App</h1>
<p>If nothing happens, pick a link below:</p>
<ul class="links">
    <li><a class="android" href="https://play.google.com/store/apps/details?id=com.ensemblers.gigs">Download on Google&nbsp;Play</a>
    </li>
    <li><a class="ios" href="https://apps.apple.com/nl/app/the-gigs-app/id6738603572?l=en-GB">Download on the App&nbsp;Store</a>
    </li>
    <li><a class="web" href="https://thegigsapp.com/">Open web site</a></li>
</ul>
</body>
</html>
